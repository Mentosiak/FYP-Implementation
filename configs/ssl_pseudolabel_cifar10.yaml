# Semi-Supervised Learning Configuration - Pseudo-Label
# CIFAR-10 with limited labeled data

run_name: ssl_pseudolabel_cifar10

dataset:
  name: cifar10
  data_dir: ./data
  num_classes: 10

model:
  architecture: wideresnet  # WideResNet-28-2 commonly used for SSL
  depth: 28
  widen_factor: 2
  dropout_rate: 0.0

training:
  epochs: 300
  batch_size: 64  # Labeled batch size
  learning_rate: 0.03
  momentum: 0.9
  weight_decay: 0.0005
  warmup_epochs: 0
  validation_split: 0.1  # Hold out 10% of labeled set for validation/model selection
  save_best: true
  save_last: true

ssl:
  enabled: true
  algorithm: pseudolabel
  labels_per_class: 250  # 250 labels per class = 2500 total for CIFAR-10
  label_fraction: null  # Alternative to labels_per_class
  unlabeled_batch_size: 256  # Much larger unlabeled batch
  confidence_threshold: 0.95  # Only use high-confidence predictions
  unlabeled_loss_weight: 1.0  # Balance between labeled and unlabeled loss
  strong_augment: true  # Use strong augmentation for unlabeled data
  temperature: 1.0  # Temperature for pseudo-label sharpening (1.0 = no sharpening)
  seed: 42  # Seed for label/unlabel split

system:
  seed: 42
  num_workers: 2
  device: cuda
  checkpoint_dir: checkpoints
  log_dir: logs
  experiment_dir: experiments
