# Supervised Learning Configuration for CIFAR-10
# Sprint 1 - Basic Configuration

dataset:
  name: cifar10
  data_dir: ./data
  num_classes: 10

model:
  architecture: resnet18  # Options: resnet18, resnet34, wideresnet
  
training:
  epochs: 200
  batch_size: 128
  learning_rate: 0.1
  momentum: 0.9
  weight_decay: 0.0005
  
system:
  seed: 42
  num_workers: 2
