# Supervised Learning Configuration for CIFAR-10
# Full supervised baseline with all labels

run_name: supervised_cifar10

dataset:
  name: cifar10
  data_dir: ./data
  num_classes: 10

model:
  architecture: resnet18  # Options: resnet18, resnet34, wideresnet
  depth: 28
  widen_factor: 2
  dropout_rate: 0.0
  
training:
  epochs: 200
  batch_size: 128
  learning_rate: 0.1
  momentum: 0.9
  weight_decay: 0.0005
  warmup_epochs: 0
  supervised_algorithm: standard  # standard, mixup, or cutmix
  mixup_alpha: 0.2
  cutmix_alpha: 1.0
  cutmix_prob: 0.5
  save_best: true
  save_last: true

ssl:
  enabled: false
  
system:
  seed: 42
  num_workers: 2
  device: cuda
  checkpoint_dir: checkpoints
  log_dir: logs
  experiment_dir: experiments

