# FlexMatch benchmark with validation-based stop-loss
# 4000 total labels = 400 labels per class

run_name: ssl_flexmatch_cifar10_4000labels

dataset:
  name: cifar10
  data_dir: ./data
  num_classes: 10

model:
  architecture: wideresnet
  depth: 28
  widen_factor: 2
  dropout_rate: 0.0

training:
  epochs: 300
  batch_size: 64
  learning_rate: 0.03
  momentum: 0.9
  weight_decay: 0.0005
  warmup_epochs: 0
  validation_split: 0.1
  stop_loss_threshold: 3.0
  stop_loss_warmup_epochs: 12
  save_best: true
  save_last: true

ssl:
  enabled: true
  algorithm: flexmatch
  labels_per_class: 400
  label_fraction: null
  unlabeled_batch_size: 256
  confidence_threshold: 0.95
  unlabeled_loss_weight: 1.0
  strong_augment: true
  temperature: 1.0
  seed: 42

system:
  seed: 42
  num_workers: 2
  device: cuda
  checkpoint_dir: checkpoints
  log_dir: logs
  experiment_dir: experiments
