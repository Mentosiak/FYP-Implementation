# Supervised limited-label benchmark aligned to standard CIFAR-10 SSL protocol
# 1000 total labels = 100 labels per class

run_name: supervised_limited_cifar10_1000labels

dataset:
  name: cifar10
  data_dir: ./data
  num_classes: 10

model:
  architecture: wideresnet
  depth: 28
  widen_factor: 2
  dropout_rate: 0.0

training:
  epochs: 300
  batch_size: 64
  learning_rate: 0.03
  momentum: 0.9
  weight_decay: 0.0005
  warmup_epochs: 0
  validation_split: 0.0
  save_best: true
  save_last: true

ssl:
  enabled: false
  labels_per_class: 100
  seed: 42

system:
  seed: 42
  num_workers: 2
  device: cuda
  checkpoint_dir: checkpoints
  log_dir: logs
  experiment_dir: experiments